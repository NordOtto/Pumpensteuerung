name: Pi Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version ohne v, leer = naechstes Patch-Release aus letztem Tag"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            LATEST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)"
            BASE="${LATEST_TAG#v}"
            if [[ -z "$LATEST_TAG" ]]; then
              BASE="$(cat VERSION 2>/dev/null || echo 0.1.0)"
            fi
            IFS=. read -r MAJOR MINOR PATCH <<< "$BASE"
            MAJOR="${MAJOR:-0}"
            MINOR="${MINOR:-1}"
            PATCH="${PATCH:-0}"
            PATCH="$((PATCH + 1))"
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            while git rev-parse "v${VERSION}" >/dev/null 2>&1; do
              PATCH="$((PATCH + 1))"
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            done
          fi
          echo "$VERSION" > VERSION
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "COMMIT=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Generate backend requirements.txt
        run: |
          cd pi/backend
          python - <<'PY' > requirements.txt
          import tomllib
          with open("pyproject.toml", "rb") as f:
              cfg = tomllib.load(f)
          for dep in cfg["project"]["dependencies"]:
              print(dep)
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pi/frontend/package-lock.json

      - name: Build frontend
        run: |
          cd pi/frontend
          npm ci --legacy-peer-deps
          npm run build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true

      - name: Build release tarball
        run: |
          mkdir -p dist/release/backend dist/release/frontend
          cp VERSION dist/release/VERSION
          printf '%s\n' "${{ steps.version.outputs.COMMIT }}" > dist/release/COMMIT
          jq -n \
            --arg version "${{ steps.version.outputs.VERSION }}" \
            --arg tag "${{ steps.version.outputs.TAG }}" \
            --arg commit "${{ steps.version.outputs.COMMIT }}" \
            --arg built_at "$(date -u +%FT%TZ)" \
            '{version:$version, tag:$tag, commit:$commit, built_at:$built_at}' \
            > dist/release/manifest.json
          cp -r pi/backend/app dist/release/backend/
          cp pi/backend/pyproject.toml dist/release/backend/
          cp pi/backend/requirements.txt dist/release/backend/
          cp pi/backend/.env.example dist/release/backend/
          cp -r pi/frontend/.next dist/release/frontend/
          cp pi/frontend/package.json dist/release/frontend/
          cd dist
          tar -czf "pumpe-${{ steps.version.outputs.TAG }}.tar.gz" -C release .
          sha256sum "pumpe-${{ steps.version.outputs.TAG }}.tar.gz" > "pumpe-${{ steps.version.outputs.TAG }}.tar.gz.sha256"

      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign

      - name: Sign tarball
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          if [[ -z "${MINISIGN_KEY:-}" ]]; then
            echo "::warning::MINISIGN_KEY secret nicht gesetzt - Release wird unsigniert hochgeladen"
            exit 0
          fi
          mkdir -p ~/.minisign
          echo "$MINISIGN_KEY" > ~/.minisign/minisign.key
          chmod 600 ~/.minisign/minisign.key
          echo "$MINISIGN_PASSWORD" | minisign -S \
            -s ~/.minisign/minisign.key \
            -m "dist/pumpe-${{ steps.version.outputs.TAG }}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          target_commitish: ${{ github.sha }}
          name: Pumpe ${{ steps.version.outputs.TAG }}
          body: |
            Commit: ${{ steps.version.outputs.COMMIT }}

            ${{ github.event.head_commit.message }}
          files: |
            dist/pumpe-${{ steps.version.outputs.TAG }}.tar.gz
            dist/pumpe-${{ steps.version.outputs.TAG }}.tar.gz.sha256
            dist/pumpe-${{ steps.version.outputs.TAG }}.tar.gz.minisig
