version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: pumpe-backend:latest
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-localhost}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASS=${MQTT_PASS:-}
      - TZ=${TZ:-Europe/Berlin}
      - DATA_DIR=/data
    volumes:
      - app-data:/data
    networks:
      - pumpe-net
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: pumpe-nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ssl-certs:/etc/nginx/ssl
    networks:
      - pumpe-net
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ssl-certs:
  app-data:

networks:
  pumpe-net:
    driver: bridge
