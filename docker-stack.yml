version: '3.9'

services:
  backend:
    image: ghcr.io/nordotto/pumpe-backend:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - MQTT_BROKER=${MQTT_BROKER:-localhost}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASS=${MQTT_PASS:-}
      - TZ=${TZ:-Europe/Berlin}
      - DATA_DIR=/data
    volumes:
      - app-data:/data
    networks:
      - pumpe-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  nginx:
    image: ghcr.io/nordotto/pumpe-nginx:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "6061:80"
      - "6060:443"
    volumes:
      - ssl-certs:/etc/nginx/ssl
    networks:
      - pumpe-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

volumes:
  ssl-certs:
  app-data:

networks:
  pumpe-net:
    driver: overlay
