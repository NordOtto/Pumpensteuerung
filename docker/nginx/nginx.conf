events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream backend {
        server backend:3000;
    }

    # Shared config for both HTTP and HTTPS
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP (behind reverse proxy – proxy terminates SSL)
    server {
        listen 80;
        root  /usr/share/nginx/html;
        index index.html;

        location / { try_files $uri /index.html; }
        location = /manifest.json { add_header Content-Type "application/manifest+json"; try_files $uri =404; }
        location = /sw.js { add_header Service-Worker-Allowed /; add_header Cache-Control "no-cache"; try_files $uri =404; }
        location /ws {
            proxy_pass http://backend; proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host; proxy_read_timeout 3600s;
        }
        location /api/ {
            proxy_pass http://backend; proxy_http_version 1.1;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }
    }

    # HTTPS (direct LAN access with self-signed cert)
    server {
        listen 443 ssl;
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root  /usr/share/nginx/html;
        index index.html;

        location / { try_files $uri /index.html; }
        location = /manifest.json { add_header Content-Type "application/manifest+json"; try_files $uri =404; }
        location = /sw.js { add_header Service-Worker-Allowed /; add_header Cache-Control "no-cache"; try_files $uri =404; }
        location = /ca.pem {
            add_header Content-Type "application/x-pem-file";
            add_header Content-Disposition 'attachment; filename="Pumpensteuerung-CA.pem"';
            try_files $uri =404;
        }
        location /ws {
            proxy_pass http://backend; proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host; proxy_read_timeout 3600s;
        }
        location /api/ {
            proxy_pass http://backend; proxy_http_version 1.1;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 10s;
        }
    }
}
