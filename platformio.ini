; ============================================================
; Modbus Gateway – ESP32 DevKit C
; LOGO 8.4 (Modbus TCP) ↔ ESP32 ↔ Sinamics V20 (Modbus RTU)
; + MQTT (Home Assistant) + Web-UI + DS18B20 + PWM Fan
; ============================================================

[env:esp32dev]
platform    = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board       = esp32dev
framework   = arduino

monitor_speed = 115200
upload_speed  = 921600

board_build.partitions = partitions.csv
board_build.filesystem = littlefs

lib_deps =
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0
    mathieucarbou/AsyncTCP         @ ^3.3.2
    https://github.com/emelianov/modbus-esp8266.git
    knolleary/PubSubClient         @ ^2.8
    bblanchon/ArduinoJson          @ ^7.3.0
    paulstoffregen/OneWire         @ ^2.3.8
    milesburton/DallasTemperature  @ ^3.11.0

; ----------------------------------------------------------
; OTA-Upload (nach Erstflash per USB aktivieren):
;   1) IP vom DevKit herausfinden (Serial Monitor / Router)
;   2) Unten upload_protocol + upload_port einkommentieren
;   3) pio run -t upload  → flasht übers Netzwerk
; ----------------------------------------------------------
; OTA-Upload:
;   Stelle sicher, dass src/secrets.h die korrekte OTA_PASSWORD enthält
;   IP des ESP32 eintragen (z.B. aus Serial Monitor oder Router-DHCP-Tabelle):
; upload_protocol = espota
; upload_port     = 192.168.x.x
; upload_flags    = --auth=DEIN_OTA_PASSWORT
